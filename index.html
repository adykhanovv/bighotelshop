    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* Экранная версия (Мобильные + Десктоп) */
        .page {
            width: 95%;
            max-width: 210mm;
            min-height: 297mm;
            margin: 10px auto;
            background: white;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 10px;
            flex-grow: 1;
            align-content: start;
        }

        @media (min-width: 640px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
            .page { padding: 25px 30px; }
        }

        /* ПЕЧАТЬ (PDF) */
/* ПЕЧАТЬ (PDF) */
        @media print {
            @page { size: A4; margin: 0; }
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .page {
                width: 210mm !important;
                height: 297mm !important;
                margin: 0 !important;
                padding: 5mm 10mm !important; /* Уменьшили верхний/нижний отступ страницы */
                box-shadow: none !important;
                page-break-after: always;
                overflow: hidden;
                display: flex !important;
            }
            .product-grid { 
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 8px !important; /* Чуть плотнее сетка */
            }
            .product-card {
                height: 195px !important; /* Фиксируем высоту ТОЛЬКО для печати */
                min-height: 195px !important;
                padding-bottom: 35px !important;
            }
            .product-img {
                height: 90px !important; /* Чуть меньше фото при печати */
            }
            .header-flex { flex-direction: row !important; align-items: center !important; }
            .contact-row { align-items: flex-end !important; text-align: right !important; }
        }

        .product-card {
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            background: white;
            min-height: 212px;
            height: auto;
            position: relative;
            overflow: hidden;
            padding-bottom: 45px;
        }

        .product-img {
            width: 100%;
            height: 110px; 
            object-fit: contain;
            background: #f8fafc;
            padding: 6px;
            border-bottom: 1px solid #f1f5f9;
        }

        .product-title {
            font-size: 10px;
            line-height: 1.1;
            height: 2.2em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            font-weight: 800;
            color: #1e3a8a;
            padding: 0 8px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .product-desc {
            font-size: 8px;
            line-height: 1.1;
            height: 2.2em;
            overflow: hidden;
            color: #64748b;
            padding: 0 8px;
            font-style: italic;
        }

        .category-divider {
            grid-column: 1 / -1;
            background: #1e3a8a;
            color: white;
            padding: 4px 15px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            border-radius: 4px;
            margin: 1px 0;
        }

        .price-container {
            position: absolute;
            bottom: 5px;
            left: 6px;
            right: 6px;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            display: flex;
            padding: 3px 4px;
            align-items: center;
        }

        .price-wholesale {
            flex-grow: 1;
            background: #eff6ff;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .badge-dop {
            background-color: #1e3a8a;
            color: white;
            padding: 2px 10px;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 8px;
            display: inline-block;
            margin-top: 2px;
        }

        .contact-row {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        /* Адаптивность контактов */
        @media (max-width: 1023px) {
            .header-flex { flex-direction: column; gap: 8px; }
            .contact-row { align-items: flex-start; text-align: left; }
        }
        
        @media (min-width: 1024px) {
            .header-flex { flex-direction: row; justify-content: justify-between; align-items: center; }
            .contact-row { align-items: flex-end; text-align: right; }
        }
    </style>
</head>
